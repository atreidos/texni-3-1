# Edge Functions: verify_jwt = false на gateway.
# JWT проверяется внутри каждой функции через getUser() — доступ без токена запрещён.
# Нужно из‑за несовместимости Legacy JWT и новых JWT Signing Keys в Supabase.

[functions.organizations-create]
